<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shift Task Logger</title>
<style>
  :root {
    --bg: #111;
    --panel: #1d1d1d;
    --panel2: #252525;
    --text: #f1f1f1;
    --muted: #aaa;
    --green: #1f8f4d;
    --yellow: #c79816;
    --red: #b73737;
    --blue: #2d6cdf;
    --border: #3a3a3a;
  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  header {
    padding: 8px 16px;
    background: #181818;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 5;
  }

  h1 {
    margin: 0;
    font-size: 1.05rem;
  }

  main {
    padding: 16px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
  }

  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .new-item-grid {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) auto auto;
    gap: 8px;
    align-items: center;
  }

  .new-item-grid select {
    width: 135px;
  }

  .new-item-grid button {
    min-width: 84px;
  }

  input, select, button, textarea {
    font: inherit;
  }

  input, select, textarea {
    background: #0f0f0f;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
  }

  input[type="text"] {
    min-width: 180px;
    flex: 1;
  }

  input[type="time"] {
    width: 130px;
  }

  button {
    color: white;
    border: 0;
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    font-weight: 650;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .start { background: var(--green); }
  .clock-in { background: #14a44d; width: 100%; }
  .pause { background: var(--yellow); }
  .revive { background: #7a654a; }
  .stop { background: var(--red); }
  .blue { background: var(--blue); }
  .gray { background: #555; }

  .small-button {
    padding: 7px 9px;
    font-size: 0.85rem;
  }

  .task {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
  }

  .task-title {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: baseline;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .label {
    font-size: 1.1rem;
    font-weight: 750;
  }

  .timer {
    font-size: 1.4rem;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
  }

  .muted {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .metrics-strip {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
    color: var(--muted);
    font-size: 0.9rem;
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
  }

  .metrics-strip strong {
    color: var(--text);
    font-weight: 750;
  }

  details.settings {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    margin-bottom: 14px;
  }

  details.settings summary {
    cursor: pointer;
    font-weight: 750;
    padding: 14px;
  }

  details.settings .settings-content {
    border-top: 1px solid var(--border);
    padding: 14px;
  }

  .saved-report {
    background: #141414;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    margin-top: 10px;
  }

  .saved-report-title {
    font-weight: 750;
    margin-bottom: 8px;
  }

  .settings-section {
    margin-bottom: 14px;
  }

  .settings-section h3 {
    margin: 0 0 8px;
    font-size: 1rem;
  }

  .inline-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .inline-toggle input {
    min-width: auto;
    flex: 0;
  }

  .edit-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-top: 10px;
  }

  .edit-grid label {
    display: block;
  }

  .edit-grid input,
  .edit-grid select {
    box-sizing: border-box;
    width: 100%;
  }

  .task-actions {
    justify-content: flex-end;
    margin-top: 12px;
  }

  .task-button-row {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .task-button-row button {
    min-width: 0;
    padding: 9px 8px;
    font-size: 0.9rem;
  }

  .divider-card {
    background: #171717;
    border: 1px dashed #6c6c6c;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
  }

  .divider-button {
    width: 100%;
    background: #4a4a4a;
  }

  #runningTasks:not(:empty) {
    margin-top: 12px;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(0, 0, 0, 0.72);
    z-index: 20;
  }

  .modal-backdrop.open {
    display: flex;
  }

  .modal {
    width: min(420px, 100%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }

  .modal.wide {
    width: min(820px, 100%);
  }

  .modal h2 {
    margin: 0 0 8px;
    font-size: 1.05rem;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 14px;
  }

  .report-preview {
    width: 100%;
    min-height: 360px;
    box-sizing: border-box;
    resize: vertical;
    white-space: pre;
    font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    font-size: 0.9rem;
    line-height: 1.35;
  }

  .summary-grid {
    display: grid;
    gap: 8px;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    padding: 6px 0;
    font-variant-numeric: tabular-nums;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
  }

  th, td {
    border-bottom: 1px solid var(--border);
    padding: 8px;
    text-align: left;
    font-size: 0.9rem;
  }

  th {
    color: var(--muted);
    font-weight: 650;
  }

  @media (max-width: 600px) {
    .row {
      flex-direction: column;
      align-items: stretch;
    }

    .new-item-grid {
      grid-template-columns: 1fr auto;
    }

    .new-item-grid input {
      grid-column: 1 / -1;
    }

    .new-item-grid select {
      width: 100%;
      min-width: 0;
    }

    .new-item-grid button {
      width: auto;
      min-width: 92px;
    }

    input[type="time"], button, select {
      width: 100%;
    }

    .new-item-grid button {
      width: auto;
    }

    .task-button-row {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .task-button-row button {
      width: auto;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Shift Task Logger</h1>
</header>

<main>
  <div class="metrics-strip">
    <span>Logged/Left/Total</span>
    <strong>
      <span id="totalLogged">00:00</span>/<span id="timeLeft">00:00</span>/<span id="shiftLength">00:00</span>
    </strong>
  </div>

  <section class="panel">
    <h2 style="margin-top:0;">New item</h2>
    <div class="new-item-grid">
      <input id="taskLabel" type="text" placeholder="Example: Area/Asset PM" />
      <select id="taskType">
        <option value="">No type</option>
        <option value="PM">PM</option>
        <option value="Reactive">Reactive</option>
        <option value="Repair">Repair</option>
        <option value="Other">Other</option>
      </select>
      <button class="start" onclick="startTask()">Start</button>
    </div>
    <div id="runningTasks"></div>
  </section>

  <button class="divider-button" onclick="addDivider()">Divider</button>

  <section class="panel">
    <h2 style="margin-top:0;">Tasks</h2>
    <div id="tasks"></div>
    <div class="row task-actions">
      <button class="blue small-button" onclick="openReportReview()">Review report</button>
      <button class="blue small-button" onclick="downloadReport()">Download report</button>
      <button class="gray small-button" onclick="copyReport()">Copy report</button>
    </div>
    <button id="clockInButton" class="clock-in" onclick="clockIn()">Clock in</button>
    <div id="clockInEdit"></div>
  </section>

  <button class="stop" style="width:100%; margin-bottom:14px;" onclick="endShift()">End shift</button>

  <details class="settings">
    <summary>Saved reports</summary>
    <div class="settings-content">
      <input id="savedReportSearch" type="text" placeholder="Search saved reports" oninput="renderSavedReports()" style="width:100%; box-sizing:border-box;" />
      <div id="savedReports"></div>
    </div>
  </details>

  <details class="settings">
    <summary>Shift summary</summary>
    <div id="shiftSummary" class="settings-content"></div>
  </details>

  <details class="settings">
    <summary>Settings</summary>
    <div class="settings-content">
      <div class="settings-section">
        <h3>Shift</h3>
        <div class="row">
          <label>
            <div class="muted">USER</div>
            <input id="userName" type="text" placeholder="Name, handle, or clock #" onchange="saveSettingsAndRender()" />
          </label>
          <label>
            <div class="muted">Shift start</div>
            <input id="shiftStart" type="time" value="20:00" onchange="saveSettingsAndRender()" />
          </label>
          <label>
            <div class="muted">Shift end</div>
            <input id="shiftEnd" type="time" value="08:00" onchange="saveSettingsAndRender()" />
          </label>
        </div>
      </div>

      <div class="settings-section">
        <h3>Task Stacking</h3>
        <div class="row">
          <label class="inline-toggle">
            <input id="taskStacking" type="checkbox" onchange="saveSettingsAndRender()" />
            Task stacking
          </label>
          <div id="gapSettings" class="row">
            <label>
              <div class="muted">Min gap</div>
              <input id="gapMin" type="number" min="0" value="3" onchange="saveSettingsAndRender()" />
            </label>
            <label>
              <div class="muted">Max gap</div>
              <input id="gapMax" type="number" min="0" value="10" onchange="saveSettingsAndRender()" />
            </label>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h3>Report</h3>
        <div class="row">
          <label>
            <div class="muted">Report mode</div>
            <select id="reportMode" onchange="saveSettingsAndRender()">
              <option value="detailed">Detailed</option>
              <option value="compact">Compact</option>
            </select>
          </label>
          <label>
            <div class="muted">Compact Reactive max minutes</div>
            <input id="compactReactiveMax" type="number" min="1" value="5" onchange="saveSettingsAndRender()" />
          </label>
        </div>
      </div>

      <div class="settings-section">
        <h3>Edit</h3>
        <label class="inline-toggle">
          <input id="editEnabled" type="checkbox" onchange="saveSettingsAndRender()" />
          Enable Edit
        </label>
      </div>
    </div>
  </details>

  <button class="gray" style="width:100%;" onclick="clearCurrentTasks()">Clear all tasks</button>
</main>

<div id="activeTaskModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="activeTaskTitle">
  <div class="modal">
    <h2 id="activeTaskTitle">Active timer running</h2>
    <div id="activeTaskMessage" class="muted"></div>
    <div class="modal-actions">
      <button class="gray" onclick="closeActiveTaskModal()">Cancel</button>
      <button id="activeTaskAction" class="pause" onclick="pauseActiveAndContinue()">Pause active and start new task</button>
    </div>
  </div>
</div>

<div id="reportReviewModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="reportReviewTitle">
  <div class="modal wide">
    <h2 id="reportReviewTitle">Review report</h2>
    <textarea id="reportPreview" class="report-preview" readonly></textarea>
    <div class="modal-actions">
      <button class="gray" onclick="closeReportReview()">Close</button>
      <button class="blue" onclick="downloadReviewedReport()">Download report</button>
      <button class="gray" onclick="copyReviewedReport()">Copy report</button>
    </div>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("shiftTasks") || "[]");
let savedReports = JSON.parse(localStorage.getItem("shiftSavedReports") || "[]");
let clockInAt = localStorage.getItem("shiftClockInAt") || "";
let settings = JSON.parse(localStorage.getItem("shiftSettings") || "{}");
let pendingStart = null;
let pendingResumeId = "";

function save() {
  localStorage.setItem("shiftTasks", JSON.stringify(tasks));
  localStorage.setItem("shiftClockInAt", clockInAt);
}

function saveReports() {
  localStorage.setItem("shiftSavedReports", JSON.stringify(savedReports));
}

function saveSettings() {
  localStorage.setItem("shiftSettings", JSON.stringify(settings));
}

function saveSettingsAndRender() {
  settings = readSettings();
  saveSettings();
  render();
}

function nowISO() {
  return new Date().toISOString();
}

function formatDateTime(iso) {
  if (!iso) return "";
  const date = ceilDateToMinute(new Date(iso));
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  const yy = String(date.getFullYear()).slice(-2);
  const hh = String(date.getHours()).padStart(2, "0");
  const min = String(date.getMinutes()).padStart(2, "0");
  return `${mm}/${dd}/${yy} ${hh}:${min}`;
}

function formatDate(isoOrDate) {
  const date = new Date(isoOrDate);
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  const yy = String(date.getFullYear()).slice(-2);
  return `${mm}/${dd}/${yy}`;
}

function formatDateSlug(isoOrDate) {
  const date = new Date(isoOrDate);
  const yyyy = date.getFullYear();
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function toDateTimeLocalValue(iso) {
  if (!iso) return "";
  const date = new Date(iso);
  date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
  return date.toISOString().slice(0, 16);
}

function fromDateTimeLocalValue(value) {
  if (!value) return "";
  return new Date(value).toISOString();
}

function ceilDateToMinute(date) {
  const rounded = new Date(date);
  if (
    rounded.getSeconds() > 0 ||
    rounded.getMilliseconds() > 0
  ) {
    rounded.setMinutes(rounded.getMinutes() + 1);
  }
  rounded.setSeconds(0, 0);
  return rounded;
}

function shiftISO(iso, deltaMs) {
  if (!iso || !deltaMs) return iso;
  return new Date(new Date(iso).getTime() + deltaMs).toISOString();
}

function secondsBetween(a, b) {
  return Math.max(0, Math.floor((new Date(b) - new Date(a)) / 1000));
}

function roundedDisplaySeconds(totalSeconds) {
  totalSeconds = Math.max(0, Number(totalSeconds) || 0);
  if (totalSeconds <= 0) return 0;
  return Math.max(60, Math.ceil(totalSeconds / 60) * 60);
}

function roundedTaskSeconds(totalSeconds) {
  totalSeconds = Math.max(0, Number(totalSeconds) || 0);
  return Math.max(60, Math.ceil(totalSeconds / 60) * 60);
}

function formatDuration(totalSeconds) {
  totalSeconds = roundedDisplaySeconds(totalSeconds);
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  return [h, m].map(n => String(n).padStart(2, "0")).join(":");
}

function displayTaskLabel(task) {
  const label = task.label || "";
  const type = task.type || "";
  if (!type) return label;
  const normalizedLabel = label.toLowerCase();
  const normalizedType = type.toLowerCase();
  if (
    normalizedLabel.endsWith(normalizedType) ||
    normalizedLabel.includes(` - ${normalizedType}`)
  ) return label;
  return `${label} - ${type}`;
}

function isDivider(entry) {
  return entry && entry.kind === "divider";
}

function taskEntries() {
  return tasks.filter(entry => !isDivider(entry));
}

function isBehindLatestDivider(entryId) {
  const entryIndex = tasks.findIndex(entry => entry.id === entryId);
  const dividerIndex = tasks.findIndex(entry => isDivider(entry));
  return dividerIndex >= 0 && entryIndex > dividerIndex;
}

function readSettings() {
  return {
    userName: document.getElementById("userName").value.trim(),
    shiftStart: document.getElementById("shiftStart").value || "20:00",
    shiftEnd: document.getElementById("shiftEnd").value || "08:00",
    taskStacking: document.getElementById("taskStacking").checked,
    gapMin: Number(document.getElementById("gapMin").value || 3),
    gapMax: Number(document.getElementById("gapMax").value || 10),
    reportMode: document.getElementById("reportMode").value || "detailed",
    compactReactiveMax: Number(document.getElementById("compactReactiveMax").value || 5),
    editEnabled: document.getElementById("editEnabled").checked
  };
}

function applySettings() {
  document.getElementById("userName").value = settings.userName || "";
  document.getElementById("shiftStart").value = settings.shiftStart || "20:00";
  document.getElementById("shiftEnd").value = settings.shiftEnd || "08:00";
  document.getElementById("taskStacking").checked = Boolean(settings.taskStacking);
  document.getElementById("gapMin").value = Number.isFinite(settings.gapMin) ? settings.gapMin : 3;
  document.getElementById("gapMax").value = Number.isFinite(settings.gapMax) ? settings.gapMax : 10;
  document.getElementById("reportMode").value = settings.reportMode || "detailed";
  document.getElementById("compactReactiveMax").value = Number.isFinite(settings.compactReactiveMax) ? settings.compactReactiveMax : 5;
  document.getElementById("editEnabled").checked = Boolean(settings.editEnabled);
  document.getElementById("gapSettings").style.display = settings.taskStacking ? "flex" : "none";
}

function clockIn() {
  if (clockInAt && !confirm("Replace the existing clock-in time?")) return;
  clockInAt = nowISO();
  save();
  render();
}

function applyClockInEdit() {
  const input = document.getElementById("clockInEditInput");
  const value = input ? input.value : "";
  if (!value) return;
  if (!confirm("Change the clock-in time?")) {
    render();
    return;
  }

  clockInAt = fromDateTimeLocalValue(value);
  save();
  render();
}

function getRawElapsedSeconds(task) {
  let elapsed = task.elapsedBeforePause || 0;

  if (task.status === "running" && task.currentStart) {
    elapsed += secondsBetween(task.currentStart, nowISO());
  }

  return elapsed;
}

function getElapsedSeconds(task) {
  return roundedTaskSeconds(getRawElapsedSeconds(task));
}

function getNewTaskDraft() {
  const labelInput = document.getElementById("taskLabel");
  const typeInput = document.getElementById("taskType");

  let label = labelInput.value.trim();
  const type = typeInput.value.trim();

  if (!label && type) label = type;
  if (!label) {
    alert("Enter a label first, like Area/Asset PM.");
    return null;
  }

  return { label, type };
}

function createTask(label, type, notes = "") {
  if (!clockInAt) clockInAt = nowISO();

  const task = {
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random(),
    label,
    type,
    status: "running",
    createdAt: nowISO(),
    firstStart: nowISO(),
    currentStart: nowISO(),
    completedAt: "",
    elapsedBeforePause: 0,
    pauseCount: 0,
    notes
  };

  tasks.unshift(task);
  document.getElementById("taskLabel").value = "";
  save();
  render();
}

function createTaskCopy(sourceTask, action) {
  createTask(
    `${displayTaskLabel(sourceTask)} - ${action}`,
    sourceTask.type || ""
  );
}

function addDivider() {
  tasks.unshift({
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random(),
    kind: "divider",
    createdAt: nowISO()
  });
  save();
  render();
}

function startTask() {
  const draft = getNewTaskDraft();
  if (!draft) return;

  const runningTask = taskEntries().find(t => t.status === "running");
  if (runningTask) {
    showStartConflictModal(runningTask, draft);
    return;
  }

  createTask(draft.label, draft.type);
}

function showStartConflictModal(runningTask, draft) {
  pendingStart = draft;
  pendingResumeId = "";
  document.getElementById("activeTaskMessage").textContent =
    `"${displayTaskLabel(runningTask)}" is running. Pause it and start "${displayTaskLabel(draft)}"?`;
  document.getElementById("activeTaskAction").textContent = "Pause active and start new task";
  document.getElementById("activeTaskTitle").textContent = "Active timer running";
  document.getElementById("activeTaskModal").classList.add("open");
}

function showResumeConflictModal(runningTask, resumeTaskEntry) {
  pendingStart = null;
  pendingResumeId = resumeTaskEntry.id;
  document.getElementById("activeTaskMessage").textContent =
    `"${displayTaskLabel(runningTask)}" is running. Pause it and resume "${displayTaskLabel(resumeTaskEntry)}"?`;
  document.getElementById("activeTaskAction").textContent = "Pause current and resume this task";
  document.getElementById("activeTaskTitle").textContent = "Active timer running";
  document.getElementById("activeTaskModal").classList.add("open");
}

function closeActiveTaskModal() {
  pendingStart = null;
  pendingResumeId = "";
  document.getElementById("activeTaskModal").classList.remove("open");
}

function pauseActiveAndContinue() {
  if (!pendingStart && !pendingResumeId) {
    closeActiveTaskModal();
    return;
  }

  const runningTask = taskEntries().find(t => t.status === "running");
  if (runningTask) {
    runningTask.elapsedBeforePause = getRawElapsedSeconds(runningTask);
    runningTask.currentStart = "";
    runningTask.status = "paused";
    runningTask.pauseCount = (runningTask.pauseCount || 0) + 1;
  }

  const draft = pendingStart;
  const resumeId = pendingResumeId;
  pendingStart = null;
  pendingResumeId = "";
  document.getElementById("activeTaskModal").classList.remove("open");

  if (draft) {
    createTask(draft.label, draft.type);
    return;
  }

  resumeTaskNow(resumeId);
}

function pauseTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.status !== "running") return;

  task.elapsedBeforePause = getRawElapsedSeconds(task);
  task.currentStart = "";
  task.status = "paused";
  task.pauseCount = (task.pauseCount || 0) + 1;

  save();
  render();
}

function resumeTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.status !== "paused") return;

  const runningTask = taskEntries().find(t => t.status === "running");
  if (runningTask) {
    showResumeConflictModal(runningTask, task);
    return;
  }

  resumeTaskNow(id);
}

function resumeTaskNow(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.status !== "paused") return;

  if (isBehindLatestDivider(id)) {
    createTaskCopy(task, "Resumed");
    return;
  }

  task.currentStart = nowISO();
  task.status = "running";

  save();
  render();
}

function stopTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.status === "stopped") return;

  task.elapsedBeforePause = getRawElapsedSeconds(task);
  task.completedAt = nowISO();
  task.currentStart = "";
  task.status = "stopped";

  save();
  render();
}

function reviveTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.status !== "stopped") return;

  const runningTask = taskEntries().find(t => t.status === "running");
  if (runningTask) {
    alert(`Finish, pause, or stop "${runningTask.label}" before reviving another item.`);
    return;
  }

  if (isBehindLatestDivider(id)) {
    createTaskCopy(task, "Revived");
    return;
  }

  task.currentStart = nowISO();
  task.completedAt = "";
  task.status = "running";

  save();
  render();
}

function deleteTask(id) {
  if (!confirm("Delete this item?")) return;
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function deleteDivider(id) {
  if (!confirm("Delete this divider?")) return;
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function updateNotes(id, value) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.notes = value;
  save();
}

function taskProjectedStop(task) {
  if (!task || !task.firstStart) return null;
  if (task.completedAt) return new Date(task.completedAt);
  return new Date(new Date(task.firstStart).getTime() + getElapsedSeconds(task) * 1000);
}

function normalizeTaskDuration(task, seconds) {
  task.elapsedBeforePause = roundedTaskSeconds(seconds);
  if (task.status === "running") {
    task.currentStart = nowISO();
  }
}

function shiftTaskEntry(task, deltaMs) {
  if (!deltaMs) return;
  const rawElapsed = task.status === "running" ? getRawElapsedSeconds(task) : null;

  task.createdAt = shiftISO(task.createdAt, deltaMs);
  task.firstStart = shiftISO(task.firstStart, deltaMs);
  task.completedAt = shiftISO(task.completedAt, deltaMs);

  if (task.status === "running") {
    task.elapsedBeforePause = rawElapsed;
    task.currentStart = nowISO();
  } else {
    task.currentStart = shiftISO(task.currentStart, deltaMs);
  }
}

function shiftNewerEntriesAfter(entryId, deltaMs) {
  if (!deltaMs) return;
  const orderedEntries = tasks.slice().reverse();
  const editedIndex = orderedEntries.findIndex(entry => entry.id === entryId);
  if (editedIndex < 0) return;

  orderedEntries.slice(editedIndex + 1).forEach(entry => {
    if (isDivider(entry)) {
      entry.createdAt = shiftISO(entry.createdAt, deltaMs);
    } else {
      shiftTaskEntry(entry, deltaMs);
    }
  });
}

function recalculateEditedTask(task, field, value) {
  const oldStop = taskProjectedStop(task);

  if (field === "firstStart") {
    const oldStart = task.firstStart ? new Date(task.firstStart) : null;
    const newStartISO = fromDateTimeLocalValue(value);
    if (!newStartISO) return 0;
    const newStart = new Date(newStartISO);
    const duration = getElapsedSeconds(task);
    task.firstStart = newStartISO;
    if (task.completedAt || task.status === "stopped") {
      task.completedAt = new Date(newStart.getTime() + duration * 1000).toISOString();
    }
    if (task.status === "running") {
      task.elapsedBeforePause = duration;
      task.currentStart = nowISO();
    } else if (oldStart && task.currentStart) {
      task.currentStart = shiftISO(task.currentStart, newStart.getTime() - oldStart.getTime());
    }
  } else if (field === "completedAt") {
    const newStopISO = fromDateTimeLocalValue(value);
    if (!newStopISO) {
      task.completedAt = "";
      if (task.status === "stopped") task.status = "paused";
      return 0;
    }

    if (!task.firstStart) task.firstStart = newStopISO;
    const seconds = roundedTaskSeconds(secondsBetween(task.firstStart, newStopISO));
    task.completedAt = new Date(new Date(task.firstStart).getTime() + seconds * 1000).toISOString();
    task.elapsedBeforePause = seconds;
    task.currentStart = "";
    task.status = "stopped";
  } else if (field === "elapsedMinutes") {
    const seconds = roundedTaskSeconds(Math.max(0, Number(value || 0)) * 60);
    normalizeTaskDuration(task, seconds);
    if ((task.completedAt || task.status === "stopped") && task.firstStart) {
      task.completedAt = new Date(new Date(task.firstStart).getTime() + seconds * 1000).toISOString();
      task.status = "stopped";
      task.currentStart = "";
    }
  }

  const newStop = taskProjectedStop(task);
  return oldStop && newStop ? newStop.getTime() - oldStop.getTime() : 0;
}

function buildEditWarnings(deltaMs) {
  const warnings = [];
  const orderedTasks = taskEntries().slice().reverse();

  if (Math.abs(deltaMs) >= 30 * 60 * 1000) {
    warnings.push(`This edit shifts newer entries by ${formatDuration(Math.abs(deltaMs) / 1000)}.`);
  }

  for (let i = 0; i < orderedTasks.length - 1; i++) {
    const currentStop = taskProjectedStop(orderedTasks[i]);
    const nextStart = orderedTasks[i + 1].firstStart ? new Date(orderedTasks[i + 1].firstStart) : null;
    if (currentStop && nextStart && currentStop > nextStart) {
      warnings.push(`Overlap: "${displayTaskLabel(orderedTasks[i])}" runs into "${displayTaskLabel(orderedTasks[i + 1])}".`);
      break;
    }
  }

  const { endDate } = shiftWindow(reportAnchorDate());
  const pastShiftEnd = orderedTasks.find(task => {
    const stop = taskProjectedStop(task);
    return stop && stop > endDate;
  });
  if (pastShiftEnd) {
    warnings.push(`This pushes "${displayTaskLabel(pastShiftEnd)}" past shift end.`);
  }

  return warnings;
}

function updateTaskField(id, field, value) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;

  if (field === "firstStart" || field === "completedAt") {
    const snapshot = JSON.stringify(tasks);
    const deltaMs = recalculateEditedTask(task, field, value);
    shiftNewerEntriesAfter(id, deltaMs);
    const warnings = buildEditWarnings(deltaMs);
    if (warnings.length && !confirm(`Review this edit:\n\n${warnings.join("\n")}\n\nApply anyway?`)) {
      tasks = JSON.parse(snapshot);
      render();
      return;
    }
  } else if (field === "elapsedMinutes") {
    const snapshot = JSON.stringify(tasks);
    const deltaMs = recalculateEditedTask(task, field, value);
    shiftNewerEntriesAfter(id, deltaMs);
    const warnings = buildEditWarnings(deltaMs);
    if (warnings.length && !confirm(`Review this edit:\n\n${warnings.join("\n")}\n\nApply anyway?`)) {
      tasks = JSON.parse(snapshot);
      render();
      return;
    }
  } else {
    task[field] = value;
  }

  save();
  render();
}

function shiftLengthSeconds() {
  const start = document.getElementById("shiftStart").value || "20:00";
  const end = document.getElementById("shiftEnd").value || "08:00";

  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);

  let startMin = sh * 60 + sm;
  let endMin = eh * 60 + em;

  if (endMin <= startMin) endMin += 24 * 60;

  return (endMin - startMin) * 60;
}

function shiftWindow(referenceDate = new Date()) {
  const start = document.getElementById("shiftStart").value || "20:00";
  const end = document.getElementById("shiftEnd").value || "08:00";
  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);

  const startDate = new Date(referenceDate);
  startDate.setHours(sh, sm, 0, 0);

  const endDate = new Date(referenceDate);
  endDate.setHours(eh, em, 0, 0);

  if (endDate <= startDate) endDate.setDate(endDate.getDate() + 1);
  if (referenceDate < startDate) {
    startDate.setDate(startDate.getDate() - 1);
    endDate.setDate(endDate.getDate() - 1);
  }

  return { startDate, endDate };
}

function reportAnchorDate() {
  const dates = [
    clockInAt,
    ...taskEntries().map(t => t.firstStart || t.createdAt)
  ].filter(Boolean).map(value => new Date(value));

  if (!dates.length) return new Date();
  return new Date(Math.min(...dates.map(date => date.getTime())));
}

function stableRandom(seed) {
  let hash = 0;
  for (let i = 0; i < seed.length; i++) {
    hash = ((hash << 5) - hash + seed.charCodeAt(i)) | 0;
  }
  return Math.abs(Math.sin(hash) * 10000) % 1;
}

function randomGapSeconds(task, index) {
  const min = Math.max(0, Number(settings.gapMin ?? 3));
  const max = Math.max(min, Number(settings.gapMax ?? 10));
  const minutes = min + Math.floor(stableRandom(`${task.id}-${index}`) * (max - min + 1));
  return minutes * 60;
}

function stackedTaskTimes(orderedTasks, anchorDate = null) {
  const fallback = shiftWindow(reportAnchorDate()).startDate;
  let cursor = anchorDate
    ? new Date(anchorDate)
    : orderedTasks[0]?.firstStart
      ? new Date(orderedTasks[0].firstStart)
      : new Date(fallback);

  return orderedTasks.map((task, index) => {
    if (index > 0) {
      cursor = new Date(cursor.getTime() + randomGapSeconds(task, index) * 1000);
    }

    const start = new Date(cursor);
    const stop = new Date(start.getTime() + getElapsedSeconds(task) * 1000);
    cursor = new Date(stop);
    return { start, stop };
  });
}

function reportType(task) {
  return (task.type || "Other").trim() || "Other";
}

function reportTaskBlock(task, stackedTimesById) {
  const stacked = stackedTimesById.get(task.id);
  const startTime = stacked ? formatDateTime(stacked.start.toISOString()) : formatDateTime(task.firstStart);
  const stopTime = task.status === "stopped"
    ? stacked
      ? formatDateTime(stacked.stop.toISOString())
      : task.completedAt ? formatDateTime(task.completedAt) : "Open"
    : "Open";
  const notes = (task.notes || "").trim() || "None";

  return [
    displayTaskLabel(task),
    `${formatDuration(getElapsedSeconds(task))} - ${startTime} - ${stopTime}`,
    notes
  ].join("\n");
}

function taskReportTimes(task, stackedTimesById) {
  const stacked = stackedTimesById.get(task.id);
  return {
    start: stacked ? stacked.start : task.firstStart ? new Date(task.firstStart) : null,
    stop: task.status === "stopped"
      ? stacked ? stacked.stop : task.completedAt ? new Date(task.completedAt) : null
      : null
  };
}

function compactReactiveBlock(tasksToCompact, stackedTimesById) {
  const total = tasksToCompact.reduce((sum, task) => sum + getElapsedSeconds(task), 0);
  const times = tasksToCompact.map(task => taskReportTimes(task, stackedTimesById));
  const starts = times.map(time => time.start).filter(Boolean);
  const stops = times.map(time => time.stop).filter(Boolean);
  const startTime = starts.length ? formatDateTime(new Date(Math.min(...starts.map(date => date.getTime()))).toISOString()) : "";
  const stopTime = stops.length === tasksToCompact.length
    ? formatDateTime(new Date(Math.max(...stops.map(date => date.getTime()))).toISOString())
    : "Open";
  const names = tasksToCompact.map(task => displayTaskLabel(task)).join("; ");
  const notes = tasksToCompact
    .map(task => (task.notes || "").trim())
    .filter(Boolean)
    .join("; ") || "None";
  const maxMinutes = Number(settings.compactReactiveMax || 5);

  return [
    `Reactive tasks ${maxMinutes} min or less`,
    `${formatDuration(total)} - ${startTime} - ${stopTime}`,
    names,
    notes
  ].join("\n");
}

function groupedTaskReportBlocks(orderedTasks, stackedTimesById, mode = settings.reportMode || "detailed") {
  const groups = [];
  const groupMap = new Map();

  for (const task of orderedTasks) {
    const type = reportType(task);
    if (!groupMap.has(type)) {
      const group = { type, tasks: [] };
      groupMap.set(type, group);
      groups.push(group);
    }
    groupMap.get(type).tasks.push(task);
  }

  return groups.map(group => {
    const total = group.tasks.reduce((sum, task) => sum + getElapsedSeconds(task), 0);
    let taskBlocks = group.tasks.map(task => reportTaskBlock(task, stackedTimesById));

    if (mode === "compact" && group.type.toLowerCase() === "reactive") {
      const maxSeconds = Math.max(60, Number(settings.compactReactiveMax || 5) * 60);
      const compactTasks = group.tasks.filter(task => getElapsedSeconds(task) <= maxSeconds);
      const detailTasks = group.tasks.filter(task => getElapsedSeconds(task) > maxSeconds);
      taskBlocks = [
        ...(compactTasks.length ? [compactReactiveBlock(compactTasks, stackedTimesById)] : []),
        ...detailTasks.map(task => reportTaskBlock(task, stackedTimesById))
      ];
    }

    return [`${group.type} - Total ${formatDuration(total)}`, ...taskBlocks].join("\n\n");
  });
}

function buildReport(useStacking = settings.taskStacking, mode = settings.reportMode || "detailed") {
  const blocks = [];

  if (settings.userName) {
    blocks.push(`USER - ${settings.userName}`);
  }

  if (clockInAt) {
    blocks.push(`Clock in - ${formatDateTime(clockInAt)}`);
  }

  const orderedTasks = taskEntries().slice().reverse();
  const stackedTimes = useStacking ? stackedTaskTimes(orderedTasks) : [];
  const stackedTimesById = new Map(orderedTasks.map((task, index) => [task.id, stackedTimes[index]]));

  return [...blocks, ...groupedTaskReportBlocks(orderedTasks, stackedTimesById, mode)].join("\n\n");
}

function buildSegmentReport(dividerId, useStacking = settings.taskStacking, mode = settings.reportMode || "detailed") {
  const orderedEntries = tasks.slice().reverse();
  const dividerIndex = orderedEntries.findIndex(entry => entry.id === dividerId);
  if (dividerIndex < 0) return "";

  const previousDividerIndex = orderedEntries
    .slice(0, dividerIndex)
    .map((entry, index) => isDivider(entry) ? index : -1)
    .filter(index => index >= 0)
    .pop();

  const startIndex = previousDividerIndex === undefined ? 0 : previousDividerIndex + 1;
  const segmentEntries = orderedEntries.slice(startIndex, dividerIndex);
  const segmentTasks = segmentEntries.filter(entry => !isDivider(entry));
  if (!segmentTasks.length) return "";

  const orderedTasks = orderedEntries.filter(entry => !isDivider(entry));
  const stackedTimes = useStacking ? stackedTaskTimes(orderedTasks) : [];
  const stackedTimesById = new Map(orderedTasks.map((task, index) => [task.id, stackedTimes[index]]));

  const blocks = [];
  if (settings.userName) blocks.push(`USER - ${settings.userName}`);
  if (clockInAt && startIndex === 0) blocks.push(`Clock in - ${formatDateTime(clockInAt)}`);

  return [...blocks, ...groupedTaskReportBlocks(segmentTasks, stackedTimesById, mode)].join("\n\n");
}

async function copyDividerSegment(dividerId) {
  const report = buildSegmentReport(dividerId, settings.taskStacking, settings.reportMode || "detailed");
  if (!report) {
    alert("No tasks in this segment.");
    return;
  }

  await copyText(report);
}

function downloadTextReport(report, filename) {
  const blob = new Blob([report], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function downloadReport() {
  const report = currentReportText();
  const stamp = formatDateSlug(new Date());
  downloadTextReport(report, `shift-report-${stamp}.txt`);
}

function currentReportText() {
  return buildReport(settings.taskStacking, settings.reportMode || "detailed");
}

function openReportReview() {
  document.getElementById("reportPreview").value = currentReportText();
  document.getElementById("reportReviewModal").classList.add("open");
}

function closeReportReview() {
  document.getElementById("reportReviewModal").classList.remove("open");
}

function downloadReviewedReport() {
  const report = document.getElementById("reportPreview").value;
  const stamp = formatDateSlug(new Date());
  downloadTextReport(report, `shift-report-${stamp}.txt`);
}

async function copyReviewedReport() {
  await copyText(document.getElementById("reportPreview").value);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    alert("Report copied.");
  } catch {
    const fallback = document.createElement("textarea");
    fallback.value = text;
    fallback.style.position = "fixed";
    fallback.style.left = "-9999px";
    document.body.appendChild(fallback);
    fallback.focus();
    fallback.select();

    if (document.execCommand("copy")) {
      alert("Report copied.");
    } else {
      alert("Could not use clipboard automatically. Use Download report instead.");
    }

    fallback.remove();
  }
}

async function copyReport() {
  await copyText(currentReportText());
}

function reportHasContent() {
  return Boolean(clockInAt) || taskEntries().length > 0;
}

function saveCurrentReport(shiftEndDate = formatDate(shiftWindow(reportAnchorDate()).endDate), silent = false) {
  if (!reportHasContent()) return false;

  const reports = {
    stacked: buildReport(true, settings.reportMode || "detailed"),
    unstacked: buildReport(false, settings.reportMode || "detailed"),
    detailedStacked: buildReport(true, "detailed"),
    detailedUnstacked: buildReport(false, "detailed"),
    compactStacked: buildReport(true, "compact"),
    compactUnstacked: buildReport(false, "compact")
  };
  const report = settings.taskStacking ? reports.stacked : reports.unstacked;
  const existing = savedReports.find(r => r.shiftEndDate === shiftEndDate);

  if (existing) {
    existing.reports = reports;
    existing.report = report;
    existing.savedAt = nowISO();
  } else {
    savedReports.unshift({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random(),
      shiftEndDate,
      savedAt: nowISO(),
      reports,
      report
    });
  }

  saveReports();
  renderSavedReports();
  if (!silent) alert(`Report saved for ${shiftEndDate}.`);
  return true;
}

function endShift() {
  if (!reportHasContent()) {
    alert("No tasks or clock-in to end.");
    return;
  }

  const runningTask = taskEntries().find(task => task.status === "running");
  if (runningTask) {
    if (!confirm(`End shift and stop "${displayTaskLabel(runningTask)}"?`)) return;
    runningTask.elapsedBeforePause = getRawElapsedSeconds(runningTask);
    runningTask.completedAt = nowISO();
    runningTask.currentStart = "";
    runningTask.status = "stopped";
  } else if (!confirm("End shift and save the current report?")) {
    return;
  }

  const { endDate } = shiftWindow(reportAnchorDate());
  save();
  saveCurrentReport(formatDate(endDate), true);
  render();
  openReportReview();
}

function checkAutoSaveReport() {
  const { endDate } = shiftWindow(reportAnchorDate());
  const dueAt = new Date(endDate.getTime() + 60 * 60 * 1000);
  const shiftEndDate = formatDate(endDate);
  const saved = savedReports.find(r => r.shiftEndDate === shiftEndDate);

  if (new Date() >= dueAt && (!saved || !saved.reports)) {
    saveCurrentReport(shiftEndDate, true);
  }
}

function downloadSavedReport(id) {
  const saved = savedReports.find(r => r.id === id);
  if (!saved) return;
  const stamp = String(saved.shiftEndDate || formatDate(new Date())).replaceAll("/", "-");
  downloadTextReport(getSavedReportText(saved), `shift-report-${stamp}.txt`);
}

async function copySavedReport(id) {
  const saved = savedReports.find(r => r.id === id);
  if (!saved) return;
  await copyText(getSavedReportText(saved));
}

function getSavedReportText(saved) {
  if (saved.reports) {
    const mode = settings.reportMode || "detailed";
    const key = `${mode}${settings.taskStacking ? "Stacked" : "Unstacked"}`;
    return saved.reports[key] || (settings.taskStacking
      ? saved.reports.stacked
      : saved.reports.unstacked);
  }

  return saved.report || "";
}

function deleteSavedReport(id) {
  if (!confirm("Delete this saved report?")) return;
  savedReports = savedReports.filter(r => r.id !== id);
  saveReports();
  renderSavedReports();
}

function createTaskCard(task, displayTimes = null) {
  const elapsed = getElapsedSeconds(task);
  const elapsedMinutes = Math.ceil(elapsed / 60);
  const displayStart = displayTimes ? displayTimes.start.toISOString() : task.firstStart;
  const displayStop = task.status === "stopped"
    ? displayTimes
      ? displayTimes.stop.toISOString()
      : task.completedAt
    : "";
  const editBlock = settings.editEnabled ? `
    <div class="edit-grid">
      <label>
        <div class="muted">Task name</div>
        <input type="text" value="${escapeAttr(task.label || "")}" onchange="updateTaskField('${task.id}', 'label', this.value)" />
      </label>
      <label>
        <div class="muted">Type</div>
        <select onchange="updateTaskField('${task.id}', 'type', this.value)">
          <option value="" ${!task.type ? "selected" : ""}>No type</option>
          <option value="PM" ${task.type === "PM" ? "selected" : ""}>PM</option>
          <option value="Reactive" ${task.type === "Reactive" ? "selected" : ""}>Reactive</option>
          <option value="Repair" ${task.type === "Repair" ? "selected" : ""}>Repair</option>
          <option value="Other" ${task.type === "Other" ? "selected" : ""}>Other</option>
        </select>
      </label>
      <label>
        <div class="muted">Start</div>
        <input type="datetime-local" value="${escapeAttr(toDateTimeLocalValue(task.firstStart))}" onchange="updateTaskField('${task.id}', 'firstStart', this.value)" />
      </label>
      <label>
        <div class="muted">Stop</div>
        <input type="datetime-local" value="${escapeAttr(toDateTimeLocalValue(task.completedAt))}" onchange="updateTaskField('${task.id}', 'completedAt', this.value)" />
      </label>
      <label>
        <div class="muted">Elapsed minutes</div>
        <input type="number" min="0" value="${elapsedMinutes}" onchange="updateTaskField('${task.id}', 'elapsedMinutes', this.value)" />
      </label>
    </div>
  ` : "";

  const div = document.createElement("div");
  div.className = "task";

  const buttons = task.status === "running"
    ? `<button class="pause" onclick="pauseTask('${task.id}')">Pause</button>
       <button class="stop" onclick="stopTask('${task.id}')">Stop</button>`
    : task.status === "paused"
    ? `<button class="start" onclick="resumeTask('${task.id}')">Resume</button>
       <button class="stop" onclick="stopTask('${task.id}')">Stop</button>`
    : `<button class="revive" onclick="reviveTask('${task.id}')">Revive</button>
       <button class="gray" disabled>Stopped</button>`;

  div.innerHTML = `
    <div class="task-title">
      <div>
        <div class="label">${escapeHTML(displayTaskLabel(task))}</div>
        <div class="muted">
          ${escapeHTML(task.status.toUpperCase())}
          - Started ${escapeHTML(formatDateTime(displayStart))}
          ${displayStop ? " - Completed " + escapeHTML(formatDateTime(displayStop)) : ""}
        </div>
      </div>
      <div class="timer" data-timer-id="${escapeAttr(task.id)}">${formatDuration(elapsed)}</div>
    </div>
    <div class="task-button-row">
      ${buttons}
      <button class="gray" onclick="deleteTask('${task.id}')">Delete</button>
    </div>
    <div style="margin-top:10px;">
      <input
        type="text"
        value="${escapeAttr(task.notes || "")}"
        placeholder="Optional notes"
        oninput="updateNotes('${task.id}', this.value)"
        style="width:100%; box-sizing:border-box;"
      />
    </div>
    ${editBlock}
  `;

  return div;
}

function createDividerCard(divider) {
  const div = document.createElement("div");
  div.className = "divider-card";
  div.innerHTML = `
    <div class="task-title">
      <div>
        <div class="label">Divider</div>
        <div class="muted">Added ${escapeHTML(formatDateTime(divider.createdAt))}</div>
      </div>
    </div>
    <div class="task-button-row">
      <button class="blue" onclick="copyDividerSegment('${divider.id}')">Copy segment</button>
      <button class="gray" disabled>Segment</button>
      <button class="gray" onclick="deleteDivider('${divider.id}')">Delete</button>
    </div>
  `;

  return div;
}

function updateLiveDisplay() {
  let total = 0;
  const timerElements = document.querySelectorAll("[data-timer-id]");

  for (const task of taskEntries()) {
    const elapsed = getElapsedSeconds(task);
    total += elapsed;

    const timer = Array.from(timerElements).find(el => el.dataset.timerId === task.id);
    if (timer) timer.textContent = formatDuration(elapsed);
  }

  const shift = shiftLengthSeconds();
  const left = Math.max(0, shift - total);

  document.getElementById("totalLogged").textContent = formatDuration(total);
  document.getElementById("shiftLength").textContent = formatDuration(shift);
  document.getElementById("timeLeft").textContent = formatDuration(left);
  renderShiftSummary();
}

function renderSavedReports() {
  const container = document.getElementById("savedReports");
  const searchInput = document.getElementById("savedReportSearch");
  const query = searchInput ? searchInput.value.trim().toLowerCase() : "";
  container.innerHTML = "";

  const filteredReports = savedReports.filter(saved => {
    if (!query) return true;
    return [
      saved.shiftEndDate,
      saved.savedAt,
      getSavedReportText(saved)
    ].join("\n").toLowerCase().includes(query);
  });

  if (!savedReports.length) {
    container.innerHTML = `<div class="muted">No saved reports yet.</div>`;
    return;
  }

  if (!filteredReports.length) {
    container.innerHTML = `<div class="muted" style="margin-top:10px;">No saved reports match.</div>`;
    return;
  }

  for (const saved of filteredReports) {
    const div = document.createElement("div");
    div.className = "saved-report";
    div.innerHTML = `
      <div class="saved-report-title">${escapeHTML(saved.shiftEndDate)}</div>
      <div class="muted">Saved ${escapeHTML(formatDateTime(saved.savedAt))}</div>
      <div class="muted">Copy/Download uses current ${settings.taskStacking ? "stacked" : "unstacked"} setting</div>
      <div class="row" style="margin-top:8px;">
        <button class="blue small-button" onclick="downloadSavedReport('${saved.id}')">Download</button>
        <button class="gray small-button" onclick="copySavedReport('${saved.id}')">Copy</button>
        <button class="stop small-button" onclick="deleteSavedReport('${saved.id}')">Delete</button>
      </div>
    `;
    container.appendChild(div);
  }
}

function renderShiftSummary() {
  const container = document.getElementById("shiftSummary");
  if (!container) return;

  const groups = new Map();
  for (const task of taskEntries()) {
    const type = reportType(task);
    const current = groups.get(type) || { total: 0, count: 0 };
    current.total += getElapsedSeconds(task);
    current.count += 1;
    groups.set(type, current);
  }

  if (!groups.size) {
    container.innerHTML = `<div class="muted">No task totals yet.</div>`;
    return;
  }

  const rows = Array.from(groups.entries()).map(([type, data]) => `
    <div class="summary-row">
      <span>${escapeHTML(type)} (${data.count})</span>
      <strong>${escapeHTML(formatDuration(data.total))}</strong>
    </div>
  `).join("");

  container.innerHTML = `<div class="summary-grid">${rows}</div>`;
}

function render() {
  applySettings();
  const runningContainer = document.getElementById("runningTasks");
  const container = document.getElementById("tasks");
  const clockInButton = document.getElementById("clockInButton");
  const clockInEdit = document.getElementById("clockInEdit");
  runningContainer.innerHTML = "";
  container.innerHTML = "";

  const displayOrder = taskEntries().slice().reverse();
  const stackedTimes = settings.taskStacking ? stackedTaskTimes(displayOrder) : [];
  const displayTimesById = new Map(displayOrder.map((task, index) => [task.id, stackedTimes[index]]));

  for (const entry of tasks) {
    if (isDivider(entry)) {
      container.appendChild(createDividerCard(entry));
      continue;
    }

    const target = entry.status === "running" ? runningContainer : container;
    target.appendChild(createTaskCard(entry, displayTimesById.get(entry.id)));
  }

  updateLiveDisplay();
  renderSavedReports();
  renderShiftSummary();

  clockInButton.textContent = clockInAt
    ? `Clocked in ${formatDateTime(clockInAt)}`
    : "Clock in";

  clockInEdit.innerHTML = settings.editEnabled ? `
    <div class="edit-grid">
      <label>
        <div class="muted">Clock in time</div>
        <input id="clockInEditInput" type="datetime-local" value="${escapeAttr(toDateTimeLocalValue(clockInAt))}" />
      </label>
      <label>
        <div class="muted">&nbsp;</div>
        <button class="blue" onclick="applyClockInEdit()">Apply clock in time</button>
      </label>
    </div>
  ` : "";
}

function clearCurrentTasks() {
  if (!confirm("Clear all current tasks and clock-in from the interface? Saved reports will remain.")) return;
  tasks = [];
  clockInAt = "";
  save();
  render();
}

function escapeHTML(str) {
  return String(str).replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[ch]));
}

function escapeAttr(str) {
  return escapeHTML(str);
}

setInterval(() => {
  updateLiveDisplay();
  checkAutoSaveReport();
}, 1000);

window.addEventListener("focus", checkAutoSaveReport);
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) checkAutoSaveReport();
});

render();
checkAutoSaveReport();
</script>
</body>
</html>
